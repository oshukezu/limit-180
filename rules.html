<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limit 180 // 遊戲規則與行動簡報</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom Cyberpunk Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      overflow-y: auto;
    }
  </style>
</head>
<body class="crt min-h-screen flex flex-col justify-between bg-slate-950">
  <!-- Header -->
  <header class="border-b-2 border-slate-800 bg-slate-950 px-4 py-3">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <h1 class="text-xl font-pixel glow-green text-green-400 tracking-wider">LIMIT 180</h1>
      <span class="text-xs font-pixel text-slate-500">// 系統行動簡報</span>
    </div>
  </header>

  <!-- Content -->
  <main class="flex-grow max-w-xl w-full mx-auto p-6 flex flex-col justify-center">
    <div class="hud-panel p-6 bg-slate-900/95 flex flex-col gap-6 text-center border-glow-green">
      <div class="border-b border-green-500/30 pb-4">
        <h2 class="text-base font-pixel text-green-400 glow-green tracking-wider">【 LIMIT 180 // 行動簡報 】</h2>
      </div>
      
      <div class="text-left font-pixel text-xs space-y-6 text-slate-200 leading-loose py-2">
        <p class="flex items-start gap-2">
          <span>⚔️</span>
          <span><strong>核心任務：</strong>在 180 秒禁區內，極速秒殺 20 回合心算難關！</span>
        </p>
        <p class="flex items-start gap-2">
          <span>⭐</span>
          <span><strong>榮譽星等：</strong>速度決定一切！答題越快，星等越高（最高 3 星）。</span>
        </p>
        <p class="flex items-start gap-2">
          <span>🔥</span>
          <span><strong>團隊榮譽：</strong>輸入相同「班級代號」，全隊得分將自動累加，衝刺全台團隊榜！</span>
        </p>
        <p class="flex items-start gap-2">
          <span>⚠️</span>
          <span><strong>特工防線：</strong>重玩已過關卡可刷新個人「答題速度」，但不會重複刷星！</span>
        </p>
        <p class="flex items-start gap-2">
          <span>🛡️</span>
          <span><strong>超時防禦盾：</strong>心算累計答對 50 題，或成功消除 10 題錯題，均可獲贈 1 個防禦盾（用於凍結超時題目）。</span>
        </p>
      </div>

      <div class="border-t border-green-500/30 pt-4 flex justify-center">
        <button onclick="window.close()" class="cyber-btn px-6 py-2.5 font-pixel text-xs text-cyan-400">
          關閉行動簡報
        </button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t-2 border-slate-800 bg-slate-950 px-4 py-3 text-center text-slate-600 text-[10px] font-pixel">
    <div class="max-w-4xl mx-auto">
      LIMIT 180 SYSTEM CORE MANUAL // v1.1.0
    </div>
  </footer>
</body>
</html>
