<!DOCTYPE html>
<html lang="zh-TW">

<head>

    :root {

  <!-- Supabase JS CDN (2.0 雲端功能) -->

  <!-- 全域環境變數與徽章配置 (取代 config.js) -->
  <script>
    window.MATH_SPRINT_CONFIG = {
      CLOUD_ENABLED: true,
      SUPABASE_URL: "https://kzlvuyxsijsffigmcnti.supabase.co",
      SUPABASE_ANON_KEY: "sb_publishable_U1YrJqNz18LedymnrjcoTg_2SxZQhd_",
      EDGE_FUNCTION_URL: ""
    };

    window.MATH_SPRINT_CONFIG.STAGE_BADGES = {};
    for (let m = 1; m <= 50; m++) {
      window.MATH_SPRINT_CONFIG.STAGE_BADGES[m] = {};
      for (let l = 1; l <= 20; l++) {
        window.MATH_SPRINT_CONFIG.STAGE_BADGES[m][l] = {
          badgeId: `badge-m${m}-l${l}`,
          name: `Mission ${m} Stage ${l} 探索者`,
          description: `成功通關 Mission ${m} 關卡 ${l}`
        };
      }
    }
    window.CFG = window.MATH_SPRINT_CONFIG;
  </script>
  <!-- Supabase 服務封裝 (確保先於其它核心邏輯加載) -->
  <script src="js/supabase-service.js"></script>
  <script src="js/supabase-service-promo.js"></script>
  <script src="js/supabase-service-team.js"></script>
  <!-- Custom Cyberpunk Styles -->
  <link rel="stylesheet" href="css/styles.css">

<body class="crt min-h-screen flex flex-col justify-between select-none">
  <!-- Sakura Canvas -->
  <canvas id="sakura-canvas"></canvas>

  <!-- Scanner Line effect -->
  <div class="scanner-line scanner-container">
    <div class="scanner-line-1"></div>
    <div class="scanner-line-2"></div>
  </div>

  <header class="border-b border-slate-800 bg-slate-950 px-4 py-3 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-xs font-pixel px-2 py-1 bg-red-600 text-white animate-pulse rounded">LIVE</span>
        <h1 id="nav-logo-title"
          class="text-xl font-pixel text-white hover:text-[#39ff14] transition-colors duration-200 tracking-wider cursor-pointer">
          LIMIT 180</h1>
      </div>
      
      <!-- Hamburger Menu Button -->
      <button id="drawer-toggle-btn" class="text-white hover:text-[#39ff14] focus:outline-none p-2 relative z-50">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- 側邊隱藏式抽屜選單 (Drawer Menu) -->
  <div id="side-drawer" class="fixed top-0 right-0 h-full w-64 bg-slate-950 border-l border-slate-800 z-50 transform translate-x-full transition-transform duration-300 ease-in-out shadow-2xl flex flex-col justify-between">
    <div class="p-6">
      <div class="flex justify-between items-center mb-8">
        <span class="text-xs font-pixel text-pink-500 glow-pink">選單 NAVIGATOR</span>
        <button id="drawer-close-btn" class="text-slate-500 hover:text-white text-lg font-bold focus:outline-none">&times;</button>
      </div>
      
      <nav id="main-nav" class="flex flex-col gap-4 font-pixel text-sm">
        <button id="nav-home-btn" class="nav-btn py-3 w-full text-center">首頁</button>
        <button id="nav-lobby-btn" class="nav-btn py-3 w-full text-center">遊戲大廳</button>
        <button id="nav-dashboard-btn" class="nav-btn py-3 w-full text-center">反應數據</button>
        <button id="nav-achievements-btn" class="nav-btn py-3 w-full text-center">成就牆</button>
        <button id="nav-store-btn" class="nav-btn py-3 w-full text-center">商店</button>
        <button id="nav-chatroom-btn" class="nav-btn py-3 w-full text-center">聊天室</button>
        <button id="nav-rules-btn" class="nav-btn py-3 w-full text-center">遊戲規則</button>
        
        <!-- 2.0：帳號按鈕 -->
        <button id="auth-account-btn" class="nav-btn px-3 py-3 w-full text-center hidden"
          onclick="document.getElementById('auth-modal').classList.remove('hidden'); document.getElementById('side-drawer').classList.add('translate-x-full');">
          👤 <span id="auth-nickname-display">---</span>
        </button>
      </nav>
      <div class="mt-5 pt-4 border-t border-slate-900">
        <button id="accessibility-toggle-btn" class="nav-btn py-3 w-full text-center">
          易讀模式：關
        </button>
      </div>
      <div class="mt-5 pt-4 border-t border-slate-900 font-pixel">
        <div class="text-[10px] text-emerald-400 mb-2">開團分享碼（5 位英數）</div>
        <div id="home-team-share-code" class="text-lg font-black text-white tracking-widest">-----</div>
        <div id="home-team-share-hint" class="text-[9px] text-slate-500 mt-1">登入後可建立專屬分享碼</div>
        <div class="grid grid-cols-2 gap-2 mt-3">
          <button id="home-team-share-generate-btn" class="cyber-btn px-2 py-2 text-[10px] text-emerald-300 border border-emerald-700 rounded">建立</button>
          <button id="home-team-share-copy-btn" class="cyber-btn px-2 py-2 text-[10px] text-cyan-300 border border-cyan-700 rounded">複製</button>
        </div>
        <div class="mt-3 pt-3 border-t border-slate-900">
          <div class="text-[10px] text-cyan-400 mb-2">輸入分享碼加入團</div>
          <input id="home-team-join-code-input" type="text" maxlength="5" placeholder="輸入5位碼"
            class="w-full bg-slate-950 border border-slate-800 px-3 py-2 text-xs text-cyan-300 rounded focus:outline-none focus:border-cyan-500 uppercase">
          <button id="home-team-join-btn" class="cyber-btn mt-2 w-full px-3 py-2 text-xs text-cyan-300 border border-cyan-700 rounded">加入團隊</button>
        </div>
        <div class="mt-3 pt-3 border-t border-slate-900">
          <div class="text-[10px] text-violet-300 mb-2">我的團隊資訊</div>
          <div id="home-team-info-empty" class="text-[10px] text-slate-500">尚未加入任何團隊</div>
          <div id="home-team-info-card" class="hidden space-y-2 text-[10px]">
            <div>團名：<span id="home-team-info-name" class="text-white">--</span></div>
            <div>身份：<span id="home-team-info-role" class="text-cyan-300">--</span></div>
            <div>成員數：<span id="home-team-info-count" class="text-yellow-300">0</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="p-6 border-t border-slate-900 text-center text-[10px] font-pixel text-slate-700">
      SYSTEM STATUS: ONLINE
    </div>
  </div>

  <!-- 點擊抽屜外部時的半透明遮罩 -->
  <div id="drawer-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden"></div>
  
  <!-- Main SPA Content Wrapper (元件將動態載入至此) -->
  <main class="flex-grow max-w-6xl w-full mx-auto p-4 flex flex-col justify-center">
    <!-- 各視圖元件 (home.html, lobby.html 等) 將由 loader.js 動態注入 -->
  </main>
  
  <!-- Footer Stats -->
  <footer class="border-t-2 border-slate-800 bg-slate-950 px-4 py-3 text-center text-slate-600 text-[10px] font-pixel">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
      <div>LIMIT 180 v1.0.0</div>
      <div>© J.J. Wang &nbsp;|&nbsp; <a href="mailto:oshukezu@gmail.com"
          class="hover:text-cyan-500 transition-colors">oshukezu@gmail.com</a></div>
    </div>
  </footer>
  
  <!-- Confetti script -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <!-- ChartJS script -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="js/generator.js"></script>

  <script src="js/missions/phase3.js"></script>
  <script src="js/missions/phase4.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/dashboard.js"></script>
  <!-- 徹底拔除 Supabase Auth 依賴，注入虛擬 Dummy 物件以維持相容性 -->
  <script>
    window.MathSprintAuth = {
      isReady: true,
      currentUser: null,
      getUser: () => null,
      getNickname: () => {
        let nick = localStorage.getItem('math_sprint_nickname');
        if (!nick) {
          const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
          nick = 'PIXEL-';
          for (let i = 0; i < 4; i++) {
            nick += chars[Math.floor(Math.random() * chars.length)];
          }
          localStorage.setItem('math_sprint_nickname', nick);
        }
        return nick;
      },
      signInAnonymously: async () => null,
      signInWithGoogle: async () => null,
      linkGoogleAccount: async () => null,
      signOut: async () => { },
      init: async () => { }
    };
    window.MathSprintCloudSync = {
      syncToCloud: async () => { },
      syncOnLogin: async () => { },
      isOnline: () => navigator.onLine
    };
  </script>
  <script src="js/leaderboard-renders.js"></script>
  <script src="js/leaderboard.js"></script>
  
  <script src="js/loader.js"></script>
  <script src="js/ui-controller.js"></script>
  
  <!-- 拆分後的核心遊戲元件模組 -->

  <script src="js/game-customization.js"></script>
  <script src="js/game-customization-home.js"></script>
  <script src="js/class-share.js"></script>
  <script src="js/game-events.js"></script>
  <script src="js/game-result.js"></script>
  <script src="js/game-review.js"></script>
  <script src="js/game-core.js"></script>
  <script src="js/game-lifecycle.js"></script>

  <script src="js/game-play.js"></script>
