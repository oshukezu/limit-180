<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <!-- 全域環境變數與徽章配置 (取代 config.js) -->
  <script>
    window.MATH_SPRINT_CONFIG = {
      CLOUD_ENABLED: true,
      SUPABASE_URL: "https://kzlvuyxsijsffigmcnti.supabase.co",
      SUPABASE_ANON_KEY: "sb_publishable_U1YrJqNz18LedymnrjcoTg_2SxZQhd_",
      EDGE_FUNCTION_URL: ""
    };

    window.MATH_SPRINT_CONFIG.STAGE_BADGES = {};
    for (let m = 1; m <= 50; m++) {
      window.MATH_SPRINT_CONFIG.STAGE_BADGES[m] = {};
      for (let l = 1; l <= 20; l++) {
        window.MATH_SPRINT_CONFIG.STAGE_BADGES[m][l] = {
          badgeId: `badge-m${m}-l${l}`,
          name: `Mission ${m} Stage ${l} 探索者`,
          description: `成功通關 Mission ${m} 關卡 ${l}`

      }
    }
    window.CFG = window.MATH_SPRINT_CONFIG;
  </script>
  <!-- Supabase 服務封裝 (確保先於其它核心邏輯加載) -->
  <script src="js/supabase-service.js"></script>
  <!-- Custom Cyberpunk Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="crt min-h-screen flex flex-col justify-between select-none">
  <!-- Scanner Line effect -->
  <div class="scanner-line scanner-container">
    <div class="scanner-line-1"></div>
    <div class="scanner-line-2"></div>
  </div>

  <!-- Main HUD Header -->
  <header class="border-b border-slate-800 bg-slate-950 px-4 py-3 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <span class="text-xs font-pixel px-2 py-1 bg-red-600 text-white animate-pulse rounded">LIVE</span>
        <h1 id="nav-logo-title" class="text-xl font-pixel text-white hover:text-[#39ff14] transition-colors duration-200 tracking-wider cursor-pointer">LIMIT 180</h1>
      </div>
      <nav id="main-nav" class="flex items-center gap-2 text-sm">
        <button id="nav-lobby-btn" class="nav-btn px-3 py-1.5 text-xs font-pixel">遊戲大廳</button>
        <button id="nav-rules-btn" class="nav-btn px-3 py-1.5 text-xs font-pixel" onclick="document.getElementById('rules-modal').classList.remove('hidden')">遊戲規則</button>
        <button id="nav-dashboard-btn" class="nav-btn px-3 py-1.5 text-xs font-pixel">反應數據</button>
        <button id="nav-achievements-btn" class="nav-btn px-3 py-1.5 text-xs font-pixel">成就牆</button>
        <!-- 2.0：帳號按鈕 -->
        <button id="auth-account-btn" class="nav-btn px-3 py-1.5 text-xs font-pixel hidden" onclick="document.getElementById('auth-modal').classList.remove('hidden')">
          👤 <span id="auth-nickname-display">---</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main SPA Content Wrapper (元件將動態載入至此) -->
  <main class="flex-grow max-w-6xl w-full mx-auto p-4 flex flex-col justify-center">
    <!-- 各視圖元件 (home.html, lobby.html 等) 將由 loader.js 動態注入 -->
  </main>

  <!-- Footer Stats -->
  <footer class="border-t-2 border-slate-800 bg-slate-950 px-4 py-3 text-center text-slate-600 text-[10px] font-pixel">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
      <div>LIMIT 180 // v1.0.0-CYBERPUNK</div>
      <div>© J.J. Wang &nbsp;|&nbsp; <a href="mailto:oshukezu@gmail.com" class="hover:text-cyan-500 transition-colors">oshukezu@gmail.com</a></div>
    </div>
  </footer>

  <!-- Confetti script -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <!-- ChartJS script -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Core Javascript Modules (Global namespace object model) -->
  <script src="js/onboarding.js"></script>
  <script src="js/onboarding-sync.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/storage-milestones.js"></script>
  <script src="js/generator.js"></script>
  <!-- 獨立 Mission 模組 -->
  <script src="js/missions/phase1.js"></script>
  <script src="js/missions/phase2.js"></script>
  <script src="js/missions/phase3.js"></script>
  <script src="js/missions/phase4.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/dashboard.js"></script>
  <!-- 徹底拔除 Supabase Auth 依賴，注入虛擬 Dummy 物件以維持相容性 -->
  <script>
    window.MathSprintAuth = {
      isReady: true,
      currentUser: null,
      getUser: () => null,
      getNickname: () => {
        let nick = localStorage.getItem('math_sprint_nickname');
        if (!nick) {
          const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
          nick = 'PIXEL-';
          for (let i = 0; i < 4; i++) {
            nick += chars[Math.floor(Math.random() * chars.length)];
          }
          localStorage.setItem('math_sprint_nickname', nick);
        }
        return nick;
      },
      signInAnonymously: async () => null,
      signInWithGoogle: async () => null,
      linkGoogleAccount: async () => null,
      signOut: async () => {},
      init: async () => {}
    };
    window.MathSprintCloudSync = {
      syncToCloud: async () => {},
      syncOnLogin: async () => {},
      isOnline: () => navigator.onLine
    };
  </script>
  <script src="js/leaderboard-renders.js"></script>
  <script src="js/leaderboard.js"></script>
  
  <script src="js/loader.js"></script>
  <script src="js/ui-controller.js"></script>
  
  <!-- 拆分後的核心遊戲元件模組 -->
  <script src="js/game-config.js"></script>
  <script src="js/game-audio.js"></script>
  <script src="js/game-scaffold.js"></script>
  <script src="js/game-lobby.js"></script>
  <script src="js/game-events.js"></script>
  <script src="js/game-result.js"></script>
  <script src="js/game-review.js"></script>
  <script src="js/game-core.js"></script>
  <script src="js/game-helper.js"></script>
  <script src="js/game-play.js"></script>

  <!-- 規則說明浮動彈窗 -->
  <div id="rules-modal" class="fixed inset-0 bg-black/85 flex items-center justify-center hidden z-50 p-4" onclick="if(event.target===this)this.classList.add('hidden')">
    <div class="hud-panel p-6 bg-slate-950 max-w-md w-full relative" style="border-color: #39ff14; box-shadow: 0 0 20px #39ff1440;">
      <!-- 右上角關閉按鈕 -->
      <button onclick="document.getElementById('rules-modal').classList.add('hidden')" class="absolute top-3 right-4 text-slate-500 hover:text-slate-300 font-pixel text-xs cursor-pointer">✕</button>
      
      <div class="text-center mb-6 border-b border-green-500/30 pb-4">
        <span class="text-xs font-pixel text-pink-500 glow-pink block mb-1">// SYSTEM CORE MANUAL //</span>
        <h3 class="text-base font-pixel text-green-400 glow-green">LIMIT 180 行動簡報</h3>
      </div>
      
      <div class="text-left font-pixel text-xs space-y-5 text-slate-200 leading-loose py-2">
        <p class="flex items-start gap-2">
          <span>⚔️</span>
          <span>在 180 秒禁區內，極速秒殺 20 回合心算難關</span>
        </p>
        <p class="flex items-start gap-2">
          <span>⭐</span>
          <span>速度決定一切！答題越快，星等越高</span>
        </p>
        <p class="flex items-start gap-2">
          <span>🔥</span>
          <span>輸入相同「班級代號」，全隊得分將自動累加，衝刺全台團隊榜</span>
        </p>
        <p class="flex items-start gap-2">
          <span>⚠️</span>
          <span>重玩已過關卡可刷新個人「答題速度」，但不會重複刷星</span>
        </p>
        <p class="flex items-start gap-2">
          <span>🛡️</span>
          <span>每項「四維刻意練習」挑戰，均可獲贈額外星星獎勵</span>
        </p>
      </div>
      
      <div class="border-t border-green-500/30 pt-4 flex justify-center">
        <button onclick="document.getElementById('rules-modal').classList.add('hidden')" class="cyber-btn px-6 py-2.5 font-pixel text-xs text-cyan-400">
          關閉，執行任務
        </button>
      </div>
    </div>
  </div>

</html>
