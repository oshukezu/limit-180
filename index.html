<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limit 180 // 心算極速挑戰</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS CDN (2.0 雲端功能) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- Supabase 服務封裝 (確保先於其它核心邏輯加載) -->
  <script src="js/supabase-service.js"></script>
  <!-- Custom Cyberpunk Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="crt min-h-screen flex flex-col justify-between select-none">
  <!-- Scanner Line effect -->
  <div class="scanner-line scanner-container">
    <div class="scanner-line-1"></div>
    <div class="scanner-line-2"></div>
  </div>

  <!-- Main HUD Header -->
  <header class="border-b-2 border-slate-800 bg-slate-950 px-4 py-3 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <span class="text-xs font-pixel px-2 py-1 bg-red-600 text-white animate-pulse border-glow-pink">LIVE</span>
        <h1 class="text-xl font-pixel glow-green text-green-400 tracking-wider">LIMIT 180</h1>
      </div>
      <nav id="main-nav" class="flex items-center gap-2 text-sm">
        <button id="nav-home-btn" class="cyber-btn px-3 py-1.5 text-xs text-cyan-400 font-pixel">首頁選單</button>
        <a href="rules.html" target="_blank" class="cyber-btn px-3 py-1.5 text-xs text-green-400 border-green-500 font-pixel flex items-center justify-center no-underline">遊戲規則</a>
        <button id="nav-dashboard-btn" class="cyber-btn px-3 py-1.5 text-xs text-cyan-400 border-cyan-500 font-pixel">家長戰報</button>
        <button id="nav-achievements-btn" class="cyber-btn px-3 py-1.5 text-xs text-pink-400 border-pink-500 font-pixel">成就牆</button>
        <!-- 2.0：帳號按鈕 -->
        <button id="auth-account-btn" class="cyber-btn px-3 py-1.5 text-xs text-purple-400 border-purple-500 font-pixel hidden" onclick="document.getElementById('auth-modal').classList.remove('hidden')">
          👤 <span id="auth-nickname-display">---</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main SPA Content Wrapper (元件將動態載入至此) -->
  <main class="flex-grow max-w-6xl w-full mx-auto p-4 flex flex-col justify-center">
    <!-- 各視圖元件 (home.html, lobby.html 等) 將由 loader.js 動態注入 -->
  </main>

  <!-- Footer Stats -->
  <footer class="border-t-2 border-slate-800 bg-slate-950 px-4 py-3 text-center text-slate-600 text-[10px] font-pixel">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
      <div>LIMIT 180 // v1.0.0-CYBERPUNK</div>
      <div>© J.J. Wang &nbsp;|&nbsp; <a href="mailto:oshukezu@gmail.com" class="hover:text-cyan-500 transition-colors">oshukezu@gmail.com</a></div>
    </div>
  </footer>

  <!-- Confetti script -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <!-- ChartJS script -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Core Javascript Modules (Global namespace object model) -->
  <script src="js/config.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/dashboard.js"></script>
  <!-- 2.0 Cloud Modules（依賴 storage.js，需在 game.js 之前載入）-->
  <script src="js/auth.js"></script>
  <script src="js/cloud-sync.js"></script>
  <script src="js/leaderboard.js"></script>
  
  <!-- 元件載入器，必須在主遊戲邏輯 game.js 之前載入 -->
  <script src="js/loader.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
