<div id="auth-modal" class="fixed inset-0 bg-black/85 flex items-center justify-center hidden z-50 p-4" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="hud-panel p-6 bg-slate-950 max-w-sm w-full text-center" style="border-color: #bf00ff; box-shadow: 0 0 20px #bf00ff40;">
    <div class="text-xs font-pixel text-purple-400 mb-1">//PLAYER IDENTITY</div>
    <h3 class="text-lg font-pixel text-white mb-5">帳號管理</h3>

    <!-- 當前身份顯示 -->
    <div class="bg-slate-900 border border-slate-700 p-3 rounded mb-4 text-left">
      <div class="text-[10px] font-pixel text-slate-500 mb-1">當前玩家代號</div>
      <div id="auth-modal-nickname" class="text-sm font-pixel text-cyan-400">---</div>
      <div id="auth-modal-status" class="text-[9px] font-tech text-slate-500 mt-1">狀態：檢查中...</div>
    </div>

    <!-- 錯誤訊息 -->
    <div id="auth-error-msg" class="hidden text-xs font-tech text-red-400 bg-red-950/60 border border-red-700 p-2 rounded mb-3"></div>

    <!-- 動作按鈕 -->
    <div class="flex flex-col gap-3">
      <button id="auth-google-btn" class="cyber-btn py-3 font-pixel text-xs" style="border-color: #bf00ff; color: #bf00ff;"
        onclick="window.MathSprintAuth?.signInWithGoogle() || window.MathSprintAuth?.linkGoogleAccount()">
        🔗 使用 Google 帳號（跨裝置同步）
      </button>
      <button class="text-xs font-pixel text-slate-500 hover:text-slate-300 py-2"
        onclick="document.getElementById('auth-modal').classList.add('hidden')">
        繼續匿名遊玩
      </button>
    </div>

    <p class="text-[9px] font-tech text-slate-600 mt-4 leading-relaxed">
      連結 Google 帳號後，您的遊戲進度將安全保存於雲端，支援多裝置登入。<br>
      匿名模式的進度只儲存在本裝置的瀏覽器中。
    </p>
  </div>
</div>
