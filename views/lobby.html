<section id="view-lobby" class="view-section hidden py-6 relative">
  <button class="close-btn" id="lobby-close-btn">&times;</button>
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-pixel text-white">關卡大廳</h2>
  </div>

  <!-- Level Progression Stats HUD -->
  <div class="bg-slate-950 border border-slate-800 p-4 mb-6 flex flex-wrap justify-between items-center gap-4 text-xs font-pixel text-slate-400">
    <div>累積獎金：<span id="lobby-stars" class="text-green-400">0</span> 💰</div>
    <div>今日獎金：<span id="lobby-today-earnings" class="text-yellow-400">0</span> 💰</div>
    <div>已解鎖最高關卡：<span id="lobby-max-level" class="text-cyan-400">Stage 01</span></div>
  </div>

  <!-- Grid of Levels -->
  <div id="levels-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Level cards will be generated by JavaScript -->
  </div>
</section>
