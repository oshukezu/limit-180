<section id="view-lobby" class="view-section hidden py-6 relative">
  <div class="flex flex-col lg:flex-row gap-6 w-full items-start">
    <!-- 左側欄：關卡大廳 -->
    <div class="flex-grow w-full lg:w-3/5 xl:w-2/3">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-pixel text-white">關卡大廳</h2>
      </div>

      <!-- Level Progression Stats HUD -->
      <div class="bg-slate-950 border border-slate-800 p-4 mb-6 flex flex-wrap justify-between items-center gap-4 text-xs font-pixel text-slate-400">
        <div>累積獎金：<span id="lobby-stars" class="text-green-400">0</span> 💰</div>
        <div>今日獎金：<span id="lobby-today-earnings" class="text-yellow-400">0</span> 💰</div>
        <div>已解鎖最高關卡：<span id="lobby-max-level" class="text-cyan-400">Stage 01</span></div>
      </div>
      
      <div class="hud-panel px-4 py-3 bg-yellow-950/20 border border-yellow-600/50 rounded mb-5 flex items-center justify-between gap-3 font-pixel">
        <div class="min-w-0">
          <div class="text-sm text-yellow-300 font-black">跳級考試 <span class="text-[10px] text-cyan-300 font-normal">持有 <span class="skip-exam-ticket-count text-white font-bold">0</span> 張</span></div>
          <div class="text-xs text-slate-400 mt-1 truncate">消耗 1 張挑戰 10 題；通過後最高 Mission +5，獎勵 200,000 💰。</div>
        </div>
        <button id="start-skip-exam-btn" class="shrink-0 px-3 py-2 rounded-lg bg-yellow-500 text-slate-950 text-[11px] font-black border border-yellow-200 shadow-[0_0_10px_rgba(250,204,21,0.28)] hover:bg-yellow-300 transition-colors" type="button">
          使用
        </button>
      </div>

      <!-- Mission Categories Filters -->
      <div class="flex flex-wrap gap-2 mb-6 border-b border-slate-800 pb-4 justify-center md:justify-start" id="lobby-category-tabs">
        <button class="px-3 py-2 text-[10px] font-pixel rounded border border-cyan-500 bg-cyan-950/20 text-cyan-400 focus:outline-none transition-all duration-200" data-min="1" data-max="10">第一階 (M1-M10)</button>
        <button class="px-3 py-2 text-[10px] font-pixel rounded border border-slate-800 bg-slate-950 text-slate-400 hover:border-slate-700 focus:outline-none transition-all duration-200" data-min="11" data-max="20">第二階 (M11-M20)</button>
        <button class="px-3 py-2 text-[10px] font-pixel rounded border border-slate-800 bg-slate-950 text-slate-400 hover:border-slate-700 focus:outline-none transition-all duration-200" data-min="21" data-max="30">第三階 (M21-M30)</button>
        <button class="px-3 py-2 text-[10px] font-pixel rounded border border-slate-800 bg-slate-950 text-slate-400 hover:border-slate-700 focus:outline-none transition-all duration-200" data-min="31" data-max="40">第四階 (M31-M40)</button>
        <button class="px-3 py-2 text-[10px] font-pixel rounded border border-slate-800 bg-slate-950 text-slate-400 hover:border-slate-700 focus:outline-none transition-all duration-200" data-min="41" data-max="50">第五階 (M41-M50)</button>
      </div>

      <!-- Grid of Levels -->
      <div id="levels-grid" class="flex flex-col gap-6 w-full">
        <!-- Level cards will be generated by JavaScript -->
      </div>
    </div>

    <!-- 右側欄：錯題消除訓練 -->
    <div class="w-full lg:w-2/5 xl:w-1/3 shrink-0 lg:sticky lg:top-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-pixel text-pink-500">錯題消除訓練</h2>
      </div>

      <!-- 錯題消除主要容器 -->
      <div class="w-full flex flex-col gap-4">
        <!-- 空白狀態提示 -->
        <div id="review-empty-state" class="hud-panel p-8 bg-slate-900/60 text-center flex flex-col items-center gap-4">
          <span class="text-4xl">🎉</span>
          <h3 class="text-base font-pixel text-cyan-400">錯題本空空如也！</h3>
          <p class="text-xs text-slate-400 font-tech">太厲害了！你目前沒有任何做錯的題目。請繼續保持！</p>
        </div>

        <!-- 錯題工作區 -->
        <div id="review-workspace" class="hidden flex flex-col gap-4">
          <!-- 待消除清單 -->
          <div class="hud-panel p-4 bg-slate-900/80 flex flex-col max-h-[220px]">
            <h3 class="text-xs font-pixel text-pink-500 mb-2">待消除清單 (<span id="review-total-count">0</span>)</h3>
            <div id="review-list-items" class="flex-grow overflow-y-auto space-y-2 pr-2">
              <!-- Wrong questions rows will be inserted here -->
            </div>
          </div>

          <!-- 解答互動區 -->
          <div class="hud-panel p-4 bg-slate-950 flex flex-col gap-3 min-h-[300px]">
            <div class="flex justify-between items-center text-[10px] font-pixel text-slate-400">
              <div>消除進度：當前題需答對 <span id="review-item-correct-count" class="text-green-400">0</span>/3 次</div>
            </div>

            <!-- 題目顯示框 -->
            <div class="bg-slate-900 border border-slate-800 p-6 flex justify-center items-center rounded min-h-[80px]">
              <div id="review-question-text" class="text-3xl font-pixel font-black text-white text-center">
                --
              </div>
            </div>

            <!-- 解答輸入框 -->
            <div class="flex items-center gap-2 w-full">
              <input type="text" id="review-input" inputmode="numeric"
                class="flex-1 min-w-0 bg-slate-900 border-2 border-pink-500 p-2 text-xl font-pixel text-pink-400 text-center rounded focus:outline-none focus:border-pink-400"
                placeholder="解答..." autocomplete="off">
              <button id="review-submit-btn"
                class="cyber-btn cyber-btn-pink px-3 py-2.5 font-pixel text-xs text-pink-400 rounded flex-shrink-0 hidden">
                確認
              </button>
            </div>

            <!-- 反饋區域 -->
            <div id="review-feedback" class="hidden p-2.5 rounded text-center text-xs font-pixel"></div>

            <!-- 虛擬小鍵盤 -->
            <div id="review-controls-container" class="mt-1">
              <div class="keypad-grid grid grid-cols-4 gap-1.5">
                <button data-review-key="1" class="cyber-btn py-2 text-xs font-pixel text-slate-300">1</button>
                <button data-review-key="2" class="cyber-btn py-2 text-xs font-pixel text-slate-300">2</button>
                <button data-review-key="3" class="cyber-btn py-2 text-xs font-pixel text-slate-300">3</button>
                <button data-review-key="back" class="cyber-btn cyber-btn-pink py-2 text-xs font-pixel text-pink-400">退格</button>

                <button data-review-key="4" class="cyber-btn py-2 text-xs font-pixel text-slate-300">4</button>
                <button data-review-key="5" class="cyber-btn py-2 text-xs font-pixel text-slate-300">5</button>
                <button data-review-key="6" class="cyber-btn py-2 text-xs font-pixel text-slate-300">6</button>
                <button data-review-key="-" class="cyber-btn py-2 text-xs font-pixel text-slate-400">-</button>

                <button data-review-key="7" class="cyber-btn py-2 text-xs font-pixel text-slate-300">7</button>
                <button data-review-key="8" class="cyber-btn py-2 text-xs font-pixel text-slate-300">8</button>
                <button data-review-key="9" class="cyber-btn py-2 text-xs font-pixel text-slate-300">9</button>
                <button data-review-key="." class="cyber-btn py-2 text-xs font-pixel text-slate-400">.</button>

                <button data-review-key="0" class="col-span-3 cyber-btn py-2 text-xs font-pixel text-slate-300">0</button>
                <button data-review-key="clear" class="cyber-btn cyber-btn-pink py-2 text-xs font-pixel text-pink-400">清除</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
