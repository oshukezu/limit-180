<section id="view-lobby" class="view-section hidden py-6 relative">
  <button class="close-btn" id="lobby-close-btn">&times;</button>
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-pixel text-white">關卡大廳</h2>
  </div>

  <!-- Level Progression Stats HUD -->
  <div class="bg-slate-950 border border-slate-800 p-4 mb-6 flex flex-wrap justify-between items-center gap-4 text-xs font-pixel text-slate-400">
    <div>累積獎金：<span id="lobby-stars" class="text-green-400">0</span> 💰</div>
    <div>今日獎金：<span id="lobby-today-earnings" class="text-yellow-400">0</span> 💰</div>
    <div>已解鎖最高關卡：<span id="lobby-max-level" class="text-cyan-400">Stage 01</span></div>
  <!-- Mission Categories Filters -->
  <div class="flex flex-wrap gap-2 mb-6 border-b border-slate-800 pb-4 justify-center md:justify-start" id="lobby-category-tabs">
    <button class="px-3 py-2 text-[10px] font-pixel rounded border border-cyan-500 bg-cyan-950/20 text-cyan-400 focus:outline-none transition-all duration-200" data-min="1" data-max="10">第一階 (M1-M10)</button>
    <button class="px-3 py-2 text-[10px] font-pixel rounded border border-slate-800 bg-slate-950 text-slate-400 hover:border-slate-700 focus:outline-none transition-all duration-200" data-min="11" data-max="20">第二階 (M11-M20)</button>
    <button class="px-3 py-2 text-[10px] font-pixel rounded border border-slate-800 bg-slate-950 text-slate-400 hover:border-slate-700 focus:outline-none transition-all duration-200" data-min="21" data-max="30">第三階 (M21-M30)</button>
    <button class="px-3 py-2 text-[10px] font-pixel rounded border border-slate-800 bg-slate-950 text-slate-400 hover:border-slate-700 focus:outline-none transition-all duration-200" data-min="31" data-max="40">第四階 (M31-M40)</button>
    <button class="px-3 py-2 text-[10px] font-pixel rounded border border-slate-800 bg-slate-950 text-slate-400 hover:border-slate-700 focus:outline-none transition-all duration-200" data-min="41" data-max="50">第五階 (M41-M50)</button>
  </div>

  <!-- Grid of Levels -->
  <div id="levels-grid" class="flex flex-wrap justify-center gap-6">
    <!-- Level cards will be generated by JavaScript -->
  </div>
</section>
