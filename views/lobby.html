<section id="view-lobby" class="view-section hidden py-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-pixel text-cyan-400 glow-blue">關卡大廳</h2>
    <button id="lobby-back-btn" class="cyber-btn px-4 py-1.5 font-pixel text-xs text-slate-400 border-slate-600">返回首頁</button>
  </div>

  <!-- Level Progression Stats HUD -->
  <div class="bg-slate-950 border border-slate-800 p-4 mb-6 flex flex-wrap justify-between items-center gap-4 text-xs font-pixel text-slate-400">
    <div>總星星：<span id="lobby-stars" class="text-green-400">0</span> ★</div>
    <div>已解鎖最高關卡：<span id="lobby-max-level" class="text-cyan-400">Stage 01</span></div>
    <div>超時防禦盾：<span id="lobby-shields" class="text-cyan-400">0</span> 🛡️</div>
  </div>

  <!-- Grid of Levels -->
  <div id="levels-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Level cards will be generated by JavaScript -->
  </div>
</section>
