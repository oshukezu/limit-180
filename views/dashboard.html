<section id="view-dashboard" class="view-section hidden py-6 relative">
  <button class="close-btn" id="dashboard-close-btn">&times;</button>
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-pixel text-white">家長戰報 (Parental Dashboard)</h2>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
    <!-- Radar Chart -->
    <div class="hud-panel p-6 bg-slate-900/80">
      <h3 class="text-sm font-pixel text-cyan-400 mb-4">// 算力核心弱點雷達</h3>
      <div class="relative min-h-[300px] flex items-center justify-center">
        <canvas id="radar-chart"></canvas>
        <div id="radar-no-data" class="absolute text-slate-500 font-pixel text-xs hidden">尚無作答數據，請先開始遊戲挑戰！</div>
      </div>
      <p class="text-xs text-slate-400 mt-4 leading-relaxed font-tech">
        雷達圖顯示在各運算範疇的平均單題反應時間（越往外圈表示思考時間越長、為您的弱點）。可針對特定範疇在錯題本或對應關卡進行加強。
      </p>
    </div>

    <!-- Line Chart -->
    <div class="hud-panel p-6 bg-slate-900/80">
      <h3 class="text-sm font-pixel text-pink-500 mb-4">// 近 7 日心算反應速度趨勢</h3>
      <div class="relative min-h-[300px] flex items-center justify-center">
        <canvas id="line-chart"></canvas>
        <div id="line-no-data" class="absolute text-slate-500 font-pixel text-xs hidden">尚無近七日歷史數據！</div>
      </div>
      <p class="text-xs text-slate-400 mt-4 leading-relaxed font-tech">
        折線圖記錄玩家過去 7 天的每日單題平均思考時間變化，持續下降代表反應力越趨敏捷！
      </p>
    </div>
  </div>

  <!-- Profile clear statistics -->
  <div class="flex justify-end gap-4">
    <button id="dashboard-reset-btn" class="cyber-btn cyber-btn-pink px-4 py-2 font-pixel text-xs text-pink-500 border-pink-700">
      清除所有資料 (重設存檔)
    </button>
  </div>
</section>
