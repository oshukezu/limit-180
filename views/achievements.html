<section id="view-achievements" class="view-section hidden py-6 relative">
  <button class="close-btn" id="achievements-close-btn">&times;</button>
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
    <h2 class="text-2xl font-pixel text-white">成就徽章牆</h2>
    <div class="flex items-center gap-2">
      <span class="text-xs font-pixel text-slate-400">選擇任務:</span>
      <select id="achievements-mission-select" class="bg-slate-950 border border-pink-500 text-pink-400 font-pixel text-xs px-3 py-1.5 rounded focus:outline-none focus:border-pink-300">
        <!-- JS 將會動態生成 Mission 1-10 選項 -->
      </select>
    </div>
  </div>

  <div id="achievements-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Achievements badges will be generated by JS -->
  </div>
</section>
