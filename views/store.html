<section id="view-store" class="view-section hidden py-6 relative">
  
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
    <h2 class="text-2xl font-pixel text-white">特工補給商店</h2>
    <div class="bg-slate-900 border border-slate-800 px-4 py-2 font-pixel text-xs text-yellow-400 flex items-center gap-2 rounded">
      <span>當前餘額:</span>
      <span id="store-coins-balance" class="text-white text-sm">0</span>
      <span>💰</span>
      <button class="store-sync-balance-btn text-[10px] text-cyan-300 border border-cyan-700 px-2 py-1 rounded hover:bg-cyan-950/40" type="button">更新</button>
    </div>
  </div>

  <!-- 代碼兌換區塊 -->
  <div class="hud-panel p-4 bg-slate-900/90 border border-slate-800 rounded mb-6 flex flex-col gap-3 font-pixel">
    <div class="text-xs text-pink-500 glow-pink">代碼兌換系統 REDEEM CODE</div>
    <div class="flex gap-2">
      <input type="text" id="redeem-code-input" placeholder="輸入 7 位代碼..." maxlength="12"
        class="flex-1 bg-slate-950 border border-slate-800 px-3 py-2 text-xs text-cyan-400 rounded focus:outline-none focus:border-cyan-500 uppercase">
      <button id="redeem-submit-btn" class="cyber-btn cyber-btn-green px-4 py-2 text-xs text-green-400 rounded">
        兌換
      </button>
    </div>
    <div id="redeem-msg" class="text-[9px] text-slate-500 font-tech hidden"></div>
  </div>

  <div class="hud-panel px-4 py-3 bg-slate-900/90 border border-yellow-700/60 rounded mb-5 flex items-center justify-between gap-3 font-pixel">
    <div class="min-w-0">
      <div class="text-sm text-yellow-300 font-black">跳級考試券 <span class="text-[10px] text-cyan-300 font-normal">持有 <span class="skip-exam-ticket-count text-white font-bold">0</span> 張</span></div>
      <div class="text-xs text-slate-400 mt-1 truncate">500,000 💰 / 張，可囤券。開始考試即消耗，失敗不退券。</div>
    </div>
    <button class="skip-exam-ticket-buy-btn shrink-0 px-3 py-2 rounded bg-yellow-950/40 text-yellow-300 border border-yellow-500 hover:bg-yellow-500 hover:text-black transition-all duration-200 text-[11px] font-bold" type="button">
      購買
    </button>
  </div>

  <!-- 商品類別分頁 -->
  <div class="flex border-b border-slate-800 mb-6 font-pixel text-xs">
    <button id="store-tab-theme" class="flex-1 text-center py-3 text-cyan-400 border-b-2 border-cyan-500 font-bold focus:outline-none cursor-pointer">主題配色</button>
    <button id="store-tab-avatar" class="flex-1 text-center py-3 text-slate-400 hover:text-white border-b border-slate-800 focus:outline-none cursor-pointer">特工頭像</button>
    <button id="store-tab-border" class="flex-1 text-center py-3 text-slate-400 hover:text-white border-b border-slate-800 focus:outline-none cursor-pointer">頭貼外框</button>
    <button id="store-tab-badge" class="flex-1 text-center py-3 text-slate-400 hover:text-white border-b border-slate-800 focus:outline-none cursor-pointer">成就徽章</button>
  </div>

  <!-- 稀有度篩選 -->
  <div id="store-rarity-filter" class="flex items-center gap-2 mb-4 font-pixel text-[10px]">
    <span class="text-slate-500 shrink-0">稀有度：</span>
    <button id="store-rarity-all" class="px-2 py-1 rounded border border-cyan-500 text-cyan-300 bg-cyan-950/20">全部</button>
    <button id="store-rarity-common" class="px-2 py-1 rounded border border-slate-800 text-slate-400 hover:text-white">一般</button>
    <button id="store-rarity-rare" class="px-2 py-1 rounded border border-slate-800 text-slate-400 hover:text-white">稀有</button>
    <button id="store-rarity-legendary" class="px-2 py-1 rounded border border-slate-800 text-slate-400 hover:text-white">傳說</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="theme-store-list">
    <!-- 商品卡片將由 JavaScript 動態生成 -->
  </div>
</section>
