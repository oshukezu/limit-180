<section id="view-result" class="view-section hidden py-6 max-w-xl mx-auto w-full">
  <div class="hud-panel p-6 bg-slate-950 text-center flex flex-col gap-6">
    <div>
      <h2 id="result-status-title" class="text-2xl font-pixel text-green-400 glow-green mb-2">挑戰成功！</h2>
      <p class="text-xs font-pixel text-slate-400" id="result-subtitle">戰績結算面板</p>
    </div>

    <!-- Stars display -->
    <div id="result-stars" class="flex justify-center gap-4 text-4xl text-green-400 my-2">
      ★ ★ ★
    </div>

    <!-- Stats List -->
    <div class="bg-slate-900 border border-slate-800 p-4 text-left rounded text-sm font-tech space-y-2">
      <div class="flex justify-between">
        <span class="text-slate-400">關卡：</span>
        <span id="result-level" class="text-white font-bold">M1 01/20</span>
      </div>
      <div class="flex justify-between">
        <span class="text-slate-400">答對題數：</span>
        <span id="result-score" class="text-white font-bold">18/20</span>
      </div>
      <div class="flex justify-between">
        <span class="text-slate-400">平均答題速度：</span>
        <span id="result-avg-time" class="text-cyan-400 font-bold">3.2 秒/題</span>
      </div>
      <div class="flex justify-between">
        <span class="text-slate-400">最高連擊 (Combo)：</span>
        <span id="result-max-combo" class="text-green-400 font-bold">12</span>
      </div>
      <div class="flex justify-between">
        <span class="text-slate-400">關卡目標速度：</span>
        <span id="result-target-speed" class="text-purple-400">2.5 秒</span>
      </div>
    </div>

    <!-- 全台排名擊敗幾位使用者 -->
    <div id="result-beat-box" class="p-4 bg-slate-900 border border-yellow-500/30 rounded-2xl flex flex-col items-center justify-center gap-1 font-pixel text-center">
      <span class="text-[10px] text-slate-400">⚡ 全台大腦極速挑戰排名 ⚡</span>
      <h3 class="text-base font-bold text-yellow-400">您擊敗了全台 <span id="result-beat-percent" class="text-xl text-[#39ff14] font-black">--%</span> 的心算特工！</h3>
    </div>

    <!-- Shield warning / feedback message -->
    <div id="result-motivation-box"
      class="p-3 bg-slate-900/60 border border-cyan-800 text-xs font-tech rounded text-cyan-300 text-center">
      差一點點！你的速度已達標 95%！再接再厲！
    </div>

    <!-- 分享戰績按鈕組 -->
    <div class="border-t border-slate-800/60 pt-4 flex flex-col gap-2 font-pixel">
      <span class="text-[9px] text-slate-500 tracking-wider">分享特工挑戰榮耀 SHARE RESULTS</span>
      <div class="flex gap-2 justify-center">
        <button id="share-line-btn" class="px-3 py-2 bg-[#06c755] hover:bg-[#05b04b] text-white text-[10px] rounded-xl flex items-center gap-1 focus:outline-none transition-colors font-bold">
          💬 LINE 分享
        </button>
        <button id="share-fb-btn" class="px-3 py-2 bg-[#1877f2] hover:bg-[#166fe5] text-white text-[10px] rounded-xl flex items-center gap-1 focus:outline-none transition-colors font-bold">
          👥 FB 分享
        </button>
        <button id="share-copy-btn" class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-cyan-400 border border-slate-700 text-[10px] rounded-xl flex items-center gap-1 focus:outline-none transition-colors font-bold">
          📋 複製戰績文字
        </button>
      </div>
    </div>

    <div class="flex gap-4 justify-center mt-2">
      <button id="result-lobby-btn" class="cyber-btn px-6 py-2.5 font-pixel text-xs text-cyan-400">
        返回大廳
      </button>
      <button id="result-retry-btn" class="cyber-btn cyber-btn-green px-6 py-2.5 font-pixel text-xs text-green-400">
        再試一次
      </button>
      <button id="result-next-btn"
        class="cyber-btn cyber-btn-green px-6 py-2.5 font-pixel text-xs text-green-400 hidden">
        往下一關
      </button>
    </div>
  </div>
</section>
